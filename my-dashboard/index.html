<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 id="greeting">Hello!</h1>
        <div id="clock">00:00:00</div>
        
        <div id="weather-container">
            <p id="weather-loading">Loading weather...</p>
            <div id="weather-info" class="hidden">
                <div class="weather-temp"><span id="temp">--</span>°C</div>
                <div id="weather-desc">--</div>
                <div class="weather-location">Current Location</div>
            </div>
        </div>

        <div class="controls">
            <button onclick="changeColor()">Change Style</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
