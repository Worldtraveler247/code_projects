<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async 3D Chess - Eddie Camacho</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<body>
    <div id="ui-container">
        <h1>Async Chess</h1>
        <p id="status">White's Turn</p>
        <div class="nudge-controls">
            <button onclick="nudgeFriend('email')">📧 Nudge via Email</button>
            <button onclick="nudgeFriend('text')">📱 Nudge via Text</button>
        </div>
        <div class="game-controls">
            <button onclick="resetGame()">🔄 Reset Match</button>
        </div>
        <div id="debug" style="font-size: 10px; margin-top: 10px; color: #888;">Select a piece to see moves.</div>
    </div>
    <div id="canvas-container"></div>

          2. In Authentication, enable the "Anonymous" sign-in provider.
          3. In Realtime Database → Rules, paste the contents of ./database.rules.json (deny-by-default + auth required + shape validation).

</html>
