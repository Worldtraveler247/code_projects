<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galactic Runner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <span class="hud-title">Galactic Runner</span>
            <span id="score"><span class="gem">✦</span> 0</span>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="controls">
            <div id="joystick-zone" class="joystick-zone">
                <div class="joystick-base">
                    <div id="joystick-knob" class="joystick-knob"></div>
                </div>
            </div>
            <div class="action-pad">
                <button id="jump-btn" class="control-btn jump-btn">JUMP</button>
            </div>
        </div>
        <footer class="credit">Created by Eddie Camacho</footer>
    </div>
    <script src="game.js"></script>
</body>
</html>
