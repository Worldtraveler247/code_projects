<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Tetris</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="score">Score: 0</div>
        <canvas id="tetris" width="240" height="400"></canvas>
        <div class="controls">
            <div class="control-row">
                <button id="rotate-btn" class="control-btn">Rotate</button>
            </div>
            <div class="control-row">
                <button id="left-btn" class="control-btn">←</button>
                <button id="down-btn" class="control-btn">↓</button>
                <button id="right-btn" class="control-btn">→</button>
            </div>
        </div>
        <div class="instructions">
            <p>Use Arrow Keys or Buttons to Play</p>
        </div>
        <footer class="credit">Created by Eddie Camacho</footer>
    </div>
    <script src="tetris.js"></script>
</body>
</html>
