name: Fetch housing market data

on:
  schedule:
    - cron: '0 12 * * *'  # daily at 12:00 UTC
  workflow_dispatch:        # allow manual run from Actions tab

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch FRED indicators
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch_housing_data.py

      - name: Commit if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- real-estate-risk/data.json; then
            echo "No data changes."
          else
            git add real-estate-risk/data.json
            git commit -m "Update housing market data $(date -u +%Y-%m-%d)"
            git push
          fi
